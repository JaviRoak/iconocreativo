<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IconoCreativo | Contacto</title>
    <meta name="description" content="Página de contacto de IconoCreativo.">
    <link rel="icon" type="image/png" href="../Imagenes/favicon.png">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="global-wave-bg" aria-hidden="true">
        <svg class="global-wave-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    </div>
    <canvas class="cursor-trail-layer" aria-hidden="true"></canvas>
    <div class="cursor-trace" aria-hidden="true"></div>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="../index.html" aria-label="Volver al inicio de IconoCreativo">
                <img class="brand-mark" src="../Imagenes/favicon.png" alt="Isotipo de IconoCreativo">
                <span class="brand-name">IconoCreativo</span>
            </a>
            <nav class="site-nav" aria-label="Navegacion principal">
                <a href="../index.html#servicios">Servicios</a>
                <a href="../index.html#estudio">Estudio</a>
                <a href="../trabajo/">Trabajo</a>
                <a href="./">Contacto</a>
            </nav>
        </header>

        <main>
            <section class="section contact-page">
                <div class="contact-layout">
                    <form class="contact-form" action="#" method="post">
                        <label class="contact-field">
                            <span>Name *</span>
                            <input type="text" name="name" placeholder="Nombre *" required>
                        </label>
                        <label class="contact-field">
                            <span>Email *</span>
                            <input type="email" name="email" placeholder="Email *" required>
                        </label>
                        <label class="contact-field">
                            <span>Company *</span>
                            <input type="text" name="company" placeholder="Empresa *" required>
                        </label>
                        <label class="contact-field">
                            <span>Phone Number *</span>
                            <input type="tel" name="phone" placeholder="Teléfono *" required>
                        </label>
                        <label class="contact-field">
                            <span>Budget *</span>
                            <input type="text" name="budget" placeholder="Presupuesto *" required>
                        </label>
                        <label class="contact-field contact-field-area">
                            <span>A brief description of your project</span>
                            <textarea name="message" placeholder="Una breve descripción de tu proyecto siempre ayuda :)"></textarea>
                        </label>
                        <div class="contact-submit-wrap">
                            <button class="contact-submit" type="submit">Contactar</button>
                        </div>
                    </form>

                    <aside class="contact-side">
                        <a href="tel:+50278503020">7850 3020</a>
                        <a href="mailto:hola@iconocreativo.com">hola@iconocreativo.com</a>
                        <a href="/">Instagram</a>
                        <a href="/">Behance</a>
                        <a href="/">LinkedIn</a>
                        <a href="/">WhatsApp</a>
                    </aside>
                </div>
            </section>
        </main>
    </div>
    <script src="../script.js"></script>
</body>
</html>
